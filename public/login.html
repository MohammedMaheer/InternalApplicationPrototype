<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StitchFlow – Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ef;
      --surface: #ffffff;
      --border: #e2ddd5;
      --border-light: #ece8e1;
      --text: #2c2825;
      --text-mid: #6b6560;
      --text-light: #9a938c;
      --accent: #b45309;
      --accent-hover: #92400e;
      --accent-bg: #fef3c7;
      --rose: #b91c48;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 40px 36px 36px;
      box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.04);
    }

    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-brand .logo {
      width: 48px;
      height: 48px;
      background: #2c2825;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }
    .login-brand .logo svg {
      width: 26px;
      height: 26px;
      stroke: #e8dfd4;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .login-brand h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .login-brand p {
      font-size: 13px;
      color: var(--text-light);
      margin-top: 4px;
    }

    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-mid);
      margin-bottom: 5px;
    }
    .field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      background: var(--surface);
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(180,83,9,.1);
    }
    .field input::placeholder {
      color: var(--text-light);
    }

    .login-btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
      margin-top: 6px;
    }
    .login-btn:hover {
      background: var(--accent-hover);
    }
    .login-btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      padding: 9px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }
    .error-msg.show {
      display: block;
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11.5px;
      color: var(--text-light);
    }

    .credentials-hint {
      background: var(--accent-bg);
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 14px 16px;
      margin-top: 20px;
      font-size: 12px;
      color: #92400e;
      line-height: 1.7;
    }
    .credentials-hint strong {
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .credentials-hint code {
      background: rgba(146,64,14,.08);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <div class="logo">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <h1>StitchFlow</h1>
        <p>Sign in to your account</p>
      </div>

      <div class="error-msg" id="loginError"></div>

      <form id="loginForm">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username" autofocus>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="login-btn" id="loginBtn">Sign in</button>
      </form>

      <div class="credentials-hint">
        <strong>Default accounts (prototype)</strong>
        <code>admin</code> / <code>admin123</code> — Full access<br>
        <code>manager</code> / <code>manager123</code> — Manage staff &amp; data<br>
        <code>tailor</code> / <code>tailor123</code> — View &amp; edit work
      </div>
    </div>
    <div class="login-footer">StitchFlow v1.0 &middot; Internal use only</div>
  </div>

  <script>
    // If already logged in, redirect to app
    fetch("/api/auth/me").then(r => {
      if (r.ok) window.location.href = "/";
    });

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("loginBtn");
      const errEl = document.getElementById("loginError");
      errEl.classList.remove("show");
      btn.disabled = true;
      btn.textContent = "Signing in…";

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("username").value.trim().toLowerCase(),
            password: document.getElementById("password").value
          })
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || "Login failed";
          errEl.classList.add("show");
          btn.disabled = false;
          btn.textContent = "Sign in";
          return;
        }

        // Success — redirect to main app
        window.location.href = "/";
      } catch (err) {
        errEl.textContent = "Network error. Please try again.";
        errEl.classList.add("show");
        btn.disabled = false;
        btn.textContent = "Sign in";
      }
    });
  </script>
</body>
</html>
