<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StitchFlow — Sign in</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --surface: rgba(24,24,27,0.7);
      --border: rgba(63,63,70,0.5);
      --text: #fafafa;
      --text-secondary: #a1a1aa;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.3);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Animated gradient background ── */
    .bg-gradient {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99,102,241,0.15), transparent),
        radial-gradient(ellipse 60% 40% at 80% 50%, rgba(168,85,247,0.08), transparent),
        radial-gradient(ellipse 50% 50% at 20% 80%, rgba(59,130,246,0.06), transparent);
    }

    /* ── Grid pattern overlay ── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
    }

    /* ── Floating orbs ── */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px);
      animation: orbFloat 20s ease-in-out infinite;
      z-index: 0; pointer-events: none;
    }
    .orb-1 { width: 300px; height: 300px; background: rgba(99,102,241,0.12); top: -80px; right: -60px; animation-delay: 0s; }
    .orb-2 { width: 250px; height: 250px; background: rgba(168,85,247,0.08); bottom: -50px; left: -40px; animation-delay: -7s; }
    .orb-3 { width: 200px; height: 200px; background: rgba(59,130,246,0.06); top: 50%; left: 60%; animation-delay: -14s; }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -40px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(40px, 30px) scale(1.02); }
    }

    /* ── Login container ── */
    .login-wrap {
      width: 100%; max-width: 420px;
      position: relative; z-index: 1;
      animation: pageEnter 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes pageEnter {
      from { opacity: 0; transform: translateY(30px) scale(0.96); filter: blur(4px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    /* ── Brand ── */
    .login-brand {
      text-align: center; margin-bottom: 40px;
      animation: brandIn 0.6s ease 0.1s both;
    }
    @keyframes brandIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-brand .logo-mark {
      width: 48px; height: 48px; margin: 0 auto 16px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: #fff;
      box-shadow: 0 8px 32px rgba(99,102,241,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
      transform: perspective(400px) rotateX(5deg);
      transition: transform 0.3s ease;
    }
    .login-brand .logo-mark:hover {
      transform: perspective(400px) rotateX(0deg) scale(1.05);
    }
    .login-brand h1 {
      font-size: 24px; font-weight: 700; color: var(--text);
      letter-spacing: -0.5px; margin-bottom: 6px;
    }
    .login-brand p {
      font-size: 14px; color: var(--text-secondary); font-weight: 400;
    }

    /* ── Glass card ── */
    .card {
      background: var(--surface);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 20px 50px rgba(0,0,0,0.4),
        0 0 80px rgba(99,102,241,0.06);
      position: relative;
      overflow: hidden;
      animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99,102,241,0.5), rgba(168,85,247,0.3), transparent);
    }

    /* ── Fields ── */
    .field { margin-bottom: 20px; }
    .field label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--text-secondary); margin-bottom: 8px;
      transition: color 0.25s;
    }
    .field:focus-within label { color: var(--accent); }
    .field input {
      width: 100%; padding: 12px 14px;
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 14px; font-family: inherit; color: var(--text);
      background: rgba(9,9,11,0.5); outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow), 0 0 20px rgba(99,102,241,0.1);
      background: rgba(9,9,11,0.8);
    }
    .field input::placeholder { color: #52525b; }

    /* ── Sign in button ── */
    .login-btn {
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: #fff; font-size: 14px; font-weight: 600;
      font-family: inherit; cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform 0.15s, box-shadow 0.25s;
      box-shadow: 0 4px 16px rgba(99,102,241,0.3), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(99,102,241,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .login-btn:active { transform: translateY(0) scale(0.98); }
    .login-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .login-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }
    .login-btn:hover::before { transform: translateX(100%); }
    .login-btn.loading { color: transparent; pointer-events: none; }
    .login-btn.loading::after {
      content: '';
      position: absolute; top: 50%; left: 50%;
      width: 18px; height: 18px; margin: -9px 0 0 -9px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error message ── */
    .error-msg {
      background: rgba(220,38,38,0.1);
      border: 1px solid rgba(220,38,38,0.2);
      color: #fca5a5;
      border-radius: 10px; font-size: 13px;
      max-height: 0; opacity: 0; overflow: hidden;
      padding: 0 14px; margin-bottom: 0;
      transition: max-height 0.3s, opacity 0.25s, padding 0.3s, margin 0.3s;
    }
    .error-msg.show {
      max-height: 60px; opacity: 1;
      padding: 12px 14px; margin-bottom: 20px;
    }

    /* ── Hint ── */
    .hint-box {
      margin-top: 24px; padding: 16px 18px;
      background: rgba(9,9,11,0.4);
      border: 1px solid var(--border); border-radius: 12px;
      font-size: 12px; color: var(--text-secondary); line-height: 1.8;
      animation: hintIn 0.5s ease 0.5s both;
    }
    @keyframes hintIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hint-box strong {
      display: block; font-size: 10px; color: #71717a;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
      font-weight: 600;
    }
    .hint-box code {
      background: rgba(99,102,241,0.12); color: #a5b4fc;
      padding: 2px 7px; border-radius: 5px;
      font-size: 12px; font-family: 'SF Mono', ui-monospace, monospace;
    }

    .footer {
      margin-top: 28px; text-align: center;
      font-size: 12px; color: #3f3f46;
      animation: footIn 0.5s ease 0.6s both;
    }
    @keyframes footIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-wrap">
  <div class="login-brand">
    <div class="logo-mark">S</div>
    <h1>StitchFlow</h1>
    <p>Sign in to your workspace</p>
  </div>

  <div class="card">
    <div class="error-msg" id="loginError"></div>
    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username" autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Sign in</button>
    </form>

    <div class="hint-box">
      <strong>Demo accounts</strong>
      <code>admin</code> / <code>admin123</code> — Full access<br>
      <code>manager</code> / <code>manager123</code> — Manage staff &amp; data<br>
      <code>tailor</code> / <code>tailor123</code> — View &amp; edit work
    </div>
  </div>
  <div class="footer">StitchFlow &middot; Internal use only</div>
</div>

<script>
  fetch("/api/auth/me").then(r => { if (r.ok) window.location.href = "/"; });

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("loginBtn");
    const errEl = document.getElementById("loginError");
    errEl.classList.remove("show");
    btn.disabled = true;
    btn.classList.add("loading");
    try {
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: document.getElementById("username").value.trim().toLowerCase(),
          password: document.getElementById("password").value
        })
      });
      const data = await res.json();
      if (!res.ok) {
        errEl.textContent = data.error || "Login failed";
        errEl.classList.add("show");
        btn.disabled = false;
        btn.classList.remove("loading");
        return;
      }
      window.location.href = "/";
    } catch (err) {
      errEl.textContent = "Network error. Please try again.";
      errEl.classList.add("show");
      btn.disabled = false;
      btn.classList.remove("loading");
    }
  });
</script>
</body>
</html>
