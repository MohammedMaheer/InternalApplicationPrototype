<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StitchFlow — Sign in</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f5f5f4;
      color: #1c1917;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }
    .login-wrap { width: 100%; max-width: 380px; }
    .login-header { margin-bottom: 32px; }
    .login-header h1 { font-size: 20px; font-weight: 600; color: #1c1917; margin-bottom: 4px; }
    .login-header p  { font-size: 14px; color: #78716c; }

    .card {
      background: #fff;
      border: 1px solid #e7e5e4;
      border-radius: 10px;
      padding: 28px 24px;
    }

    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: #44403c; margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 9px 12px;
      border: 1px solid #d6d3d1; border-radius: 7px;
      font-size: 14px; font-family: inherit; color: #1c1917;
      background: #fff; outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.12);
    }
    .field input::placeholder { color: #a8a29e; }

    .login-btn {
      width: 100%; padding: 10px; border: none; border-radius: 7px;
      background: #1c1917; color: #fff; font-size: 14px; font-weight: 500;
      font-family: inherit; cursor: pointer; transition: background .15s;
    }
    .login-btn:hover { background: #292524; }
    .login-btn:active { background: #1c1917; }
    .login-btn:disabled { opacity: .5; cursor: not-allowed; }

    .error-msg {
      background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
      padding: 10px 12px; border-radius: 7px; font-size: 13px;
      margin-bottom: 18px; display: none;
    }
    .error-msg.show { display: block; }

    .hint-box {
      margin-top: 20px; padding: 14px 16px;
      background: #fafaf9; border: 1px solid #e7e5e4; border-radius: 8px;
      font-size: 12px; color: #78716c; line-height: 1.7;
    }
    .hint-box strong { display: block; font-size: 11px; color: #57534e; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .hint-box code { background: #f5f5f4; padding: 1px 5px; border-radius: 3px; font-size: 12px; font-family: ui-monospace, monospace; color: #44403c; }

    .footer { margin-top: 24px; text-align: center; font-size: 12px; color: #a8a29e; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-header">
    <h1>StitchFlow</h1>
    <p>Sign in to continue</p>
  </div>

  <div class="card">
    <div class="error-msg" id="loginError"></div>
    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username" autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Sign in</button>
    </form>

    <div class="hint-box">
      <strong>Demo accounts</strong>
      <code>admin</code> / <code>admin123</code> — Full access<br>
      <code>manager</code> / <code>manager123</code> — Manage staff &amp; data<br>
      <code>tailor</code> / <code>tailor123</code> — View &amp; edit work
    </div>
  </div>
  <div class="footer">Internal use only</div>
</div>

<script>
  fetch("/api/auth/me").then(r => { if (r.ok) window.location.href = "/"; });

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("loginBtn");
    const errEl = document.getElementById("loginError");
    errEl.classList.remove("show");
    btn.disabled = true;
    btn.textContent = "Signing in\u2026";
    try {
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: document.getElementById("username").value.trim().toLowerCase(),
          password: document.getElementById("password").value
        })
      });
      const data = await res.json();
      if (!res.ok) {
        errEl.textContent = data.error || "Login failed";
        errEl.classList.add("show");
        btn.disabled = false;
        btn.textContent = "Sign in";
        return;
      }
      window.location.href = "/";
    } catch (err) {
      errEl.textContent = "Network error. Please try again.";
      errEl.classList.add("show");
      btn.disabled = false;
      btn.textContent = "Sign in";
    }
  });
</script>
</body>
</html>
