services:
  - type: web
    name: stitchflow
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
    disk:
      name: stitchflow-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
